{% extends 'base.html' %}

{% block content %}

<div class="form-box">

<h1>Add Expense</h1>

<form method="POST">

<input
type="text"
name="title"
placeholder="Expense Title"
required>

<input
type="number"
step="0.01"
name="amount"
placeholder="Amount"
required>

<select name="category">

<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Health</option>
<option>Entertainment</option>
<option>Education</option>
<option>Others</option>

</select>

<button type="submit">

<i class="fa-solid fa-plus"></i>

Add Expense

</button>

</form>

</div>

{% endblock %}
